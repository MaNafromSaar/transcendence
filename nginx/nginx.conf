events {
    worker_connections 1024;
}

http {
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    # Upstream definitions
    upstream n8n {
        server n8n:5678;
    }

    upstream metabase {
        server metabase:3000;
    }

    upstream pgadmin {
        server pgadmin:80;
    }

    upstream openwebui {
        server open-webui:8080;
    }

    # Main server block - Redirect HTTP to HTTPS (future)
    server {
        listen 80 default_server;
        server_name _;

        # Health check endpoint (no auth)
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # All other traffic requires auth
        location / {
            return 301 https://$host$request_uri;
        }
    }

      # HTTPS Server Block (Port 443)
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # SSL Configuration
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Basic Auth for all services
        auth_basic "keepITlocal Secure Access";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # n8n
        location /n8n/ {
            limit_req zone=general burst=20 nodelay;
            
            proxy_pass http://n8n:5678/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_cache_bypass $http_upgrade;
            
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_redirect off;
        }

        # Metabase
        location /metabase/ {
            limit_req zone=general burst=20 nodelay;
            
            proxy_pass http://metabase/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Metabase specific
            proxy_set_header X-Forwarded-Host $host;
            client_max_body_size 50M;
        }

        # pgAdmin
        location /pgadmin/ {
            limit_req zone=general burst=10 nodelay;
            
            proxy_pass http://pgadmin/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name /pgadmin;
            proxy_cache_bypass $http_upgrade;
        }

        # Open-WebUI (ChatGPT-like interface for Ollama)
        location /chat/ {
            limit_req zone=general burst=20 nodelay;
            
            proxy_pass http://openwebui/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_buffering off;
        }

        # Root - Info page
        location = / {
            return 200 "keepITlocal Server - Secure Access\n\nServices:\n- /n8n/\n- /metabase/\n- /pgadmin/\n- /chat/\n\nAll access logged and monitored.\n";
            add_header Content-Type text/plain;
        }

        # Block all other paths
        location / {
            return 404;
        }
    }

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Hide nginx version
    server_tokens off;
}
